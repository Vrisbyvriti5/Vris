  <body>
    <div id="root">
      <!-- Initial loader — visible instantly, removed by React mount -->
      <div id="nirvi-initial-loader" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#ffffff;">
        <span style="
          font-family:'Playfair Display','Georgia','Times New Roman',serif;
          font-size:42px;font-weight:600;letter-spacing:0.04em;
          color:#f7b6c8;line-height:1;user-select:none;
          background:linear-gradient(165deg,#f7b6c8 0%,#fcd5e0 38%,#f7b6c8 52%,#eea3b8 100%);
          -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
          animation:nirvi-init-spin 1.2s cubic-bezier(0.45,0.05,0.55,0.95) infinite,
                   nirvi-init-glow 2.4s ease-in-out infinite;
          filter:drop-shadow(0 1px 3px rgba(247,182,200,0.20));
          will-change:transform,opacity;
        ">N</span>
      </div>
      <style>
        @keyframes nirvi-init-spin{0%{transform:perspective(600px) rotateY(0deg)}100%{transform:perspective(600px) rotateY(360deg)}}
        @keyframes nirvi-init-glow{0%,100%{text-shadow:0 0 8px rgba(247,182,200,0.45),0 0 20px rgba(247,182,200,0.25);opacity:1}50%{text-shadow:0 0 14px rgba(247,182,200,0.65),0 0 32px rgba(247,182,200,0.40);opacity:0.92}}
      </style>
    </div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
